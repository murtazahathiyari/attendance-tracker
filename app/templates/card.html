<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ID Card — {{ student.first_name }} {{ student.last_name }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f5f7; padding: 40px; }
    .sheet { display: grid; grid-template-columns: repeat(2, 3.5in); grid-template-rows: repeat(4, 2in); gap: 0; width: 7in; margin: 0 auto; background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .card { border: 1px solid #ddd; display: grid; grid-template-rows: 0.35in 1fr; overflow: hidden; }
    .card-header { background: #2659d9; color: white; padding: 0 0.15in; display: flex; align-items: center; font-weight: 600; font-size: 11pt; }
    .card-body { display: grid; grid-template-columns: 1fr auto; padding: 0.15in; gap: 0.15in; align-items: end; }
    .name { font-weight: 700; font-size: 14pt; color: #111; margin: 0 0 0.05in 0; }
    .code { font-size: 10pt; color: #555; margin: 0; }
    .instructions { font-size: 7pt; color: #888; font-style: italic; margin-top: 0.2in; }
    .qr img { width: 1.1in; height: 1.1in; display: block; }
    .footer { text-align: center; color: #888; font-size: 9pt; margin-top: 24px; }
    @media print {
      body { background: white; padding: 0.5in; }
      .sheet { box-shadow: none; }
      .footer { display: none; }
    }
  </style>
</head>
<body>
  <div class="sheet">
    {% for _ in range(8) %}
    <div class="card">
      <div class="card-header">Attendance Tracker</div>
      <div class="card-body">
        <div>
          <p class="name">{{ student.first_name }} {{ student.last_name }}</p>
          <p class="code">ID: {{ student.student_code }}</p>
          <p class="instructions">Hold next to face at check-in.<br />Do not share. Re-enroll if lost.</p>
        </div>
        <div class="qr"><img src="{{ qr_data_uri }}" alt="QR" /></div>
      </div>
    </div>
    {% endfor %}
  </div>
  <p class="footer">Cut along the borders. Use Ctrl/Cmd+P to print.</p>
</body>
</html>
